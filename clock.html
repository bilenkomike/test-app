<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            text-align: center;\n        }\n        .time {\n            font-size: 48px;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <h1>Digital Clock</h1>\n        <div class="time" id="clock"></div>\n        <div id="timezone"></div>\n    </div>\n    <script>\n        function updateClock() {\n            const utcOffset = {\n                'UTC': 0,\n                'EST': -5,\n                'CST': -6,\n                'MST': -7,\n                'PST': -8\n            };\n            const now = new Date();\n            let timeHTML = '';\n            for (const [zone, offset] of Object.entries(utcOffset)) {\n                const localTime = new Date(now.getTime() + (offset * 3600 * 1000));\n                timeHTML += `<div>${zone}: ${localTime.toLocaleTimeString()}</div>`;\n            }\n            document.getElementById('clock').innerHTML = timeHTML;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
